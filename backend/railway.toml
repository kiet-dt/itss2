# Railway — đặt Root Directory = backend trong dashboard
# Volume: Add Volume → Mount Path = /app/data (khớp DATA_DIR bên dưới)

[build]
buildCommand = "npm install && npm run build"

[deploy]
startCommand = "npm start"
restartPolicyType = "on_failure"

[env]
DATA_DIR = "/app/data"
NODE_VERSION = "22"
